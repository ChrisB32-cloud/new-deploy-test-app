version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: next-app
    environment:
      - NODE_ENV=production
    ports:
      - $PORT:$PORT
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", $URL]
      interval: 30s
      # timeout: 3s
      retries: 3
      start_period: 5s

